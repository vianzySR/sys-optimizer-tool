name: Kali QEMU

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kali:
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Install Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo nohup tailscaled > /tmp/tailscaled.log 2>&1 &
          sleep 5

          sudo tailscale up \
            --authkey="$TS_AUTHKEY" \
            --hostname="kali-qemu-${GITHUB_RUN_ID}"

          echo "TAILSCALE_IP=$(tailscale ip -4 | head -n1)" >> $GITHUB_ENV

      - name: Create compose file
        run: |
          mkdir -p qemu

          cat > docker-compose.yml <<EOF
          services:
            qemu:
              image: qemux/qemu
              container_name: qemu
              environment:
                BOOT: "kali"
                RAM_SIZE: "4G"
                CPU_CORES: "2"
                DISK_SIZE: "32G"
              devices:
                - /dev/kvm
                - /dev/net/tun
              cap_add:
                - NET_ADMIN
              ports:
                - 8006:8006
              volumes:
                - ./qemu:/storage
              restart: "no"
              stop_grace_period: 2m
          EOF

      - name: Start Kali QEMU
        run: |
          sudo docker compose up -d
          sudo docker ps

      - name: Access info
        run: |
          echo "================================"
          echo "KALI QEMU READY"
          echo ""
          echo "Web UI:"
          echo "http://$TAILSCALE_IP:8006"
          echo ""
          echo "Duration: 4 hours"
          echo "================================"

          sleep 14400

      - name: Cleanup
        if: always()
        run: |
          sudo docker compose down -v || true
          sudo docker system prune -f --volumes || true
          sudo tailscale logout || true
          sudo pkill tailscaled || true
