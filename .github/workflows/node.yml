name: Kali QEMU Pinggy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kali:
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl net-tools openssh-client

      - name: Create compose file
        run: |
          mkdir -p qemu

          if [ -e /dev/kvm ]; then
            KVM_LINE="- /dev/kvm"
          else
            KVM_LINE=""
          fi

          cat > docker-compose.yml <<EOF
          services:
            qemu:
              image: qemux/qemu
              container_name: qemu
              network_mode: host
              environment:
                BOOT: "kali"
                RAM_SIZE: "4G"
                CPU_CORES: "2"
                DISK_SIZE: "32G"
              devices:
                ${KVM_LINE}
                - /dev/net/tun
              cap_add:
                - NET_ADMIN
              volumes:
                - ./qemu:/storage
              restart: "no"
              stop_grace_period: 2m
          EOF

          cat docker-compose.yml

      - name: Start Kali QEMU
        run: |
          sudo docker compose up -d
          sudo docker ps -a

      - name: Wait for Web UI
        run: |
          echo "Waiting for QEMU Web UI on port 8006..."

          for i in {1..120}; do
            if curl -s http://127.0.0.1:8006 >/dev/null; then
              echo "Web UI ready"
              break
            fi

            echo "Waiting $i..."
            sudo docker logs qemu --tail 30 || true
            sleep 5
          done

          echo "Listening ports:"
          sudo netstat -tulpn | grep 8006 || true

          echo "Local test:"
          curl -I http://127.0.0.1:8006 || true

      - name: Start Pinggy tunnel
        run: |
          echo "Starting Pinggy tunnel..."
          echo "Command:"
          echo "ssh -p 443 -R0:127.0.0.1:8006 qr@free.pinggy.io"

          ssh -p 443 \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -R0:127.0.0.1:8006 \
            qr@free.pinggy.io | tee pinggy.log &

          sleep 15

          echo "======================================"
          echo "PINGGY LOG:"
          cat pinggy.log || true
          echo "======================================"

          echo "Tunnel aktif. Cek link di log atas."
          sleep 14400

      - name: Cleanup
        if: always()
        run: |
          sudo docker compose down -v || true
          sudo docker rm -f qemu || true
          sudo docker system prune -f --volumes || true
